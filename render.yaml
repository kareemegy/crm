services:
  - type: web
    name: crm-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    # SQLite file persists across deploys via a mounted disk.
    disk:
      name: crm-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DB_FILE
        value: /var/data/crm.db
      - key: CORS_ORIGIN
        sync: false
