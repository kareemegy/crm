name: Android APK (Firebase edition)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'client-firebase/**'
      - 'mobile-firebase/**'
      - '.github/workflows/android-apk-firebase.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client-firebase/package-lock.json
            mobile-firebase/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install client-firebase deps
        working-directory: client-firebase
        run: npm ci

      - name: Write Firebase config to .env.local
        working-directory: client-firebase
        env:
          API_KEY:       ${{ secrets.VITE_FIREBASE_API_KEY }}
          AUTH_DOMAIN:   ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          PROJECT_ID:    ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          STORAGE:       ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          SENDER_ID:     ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          APP_ID:        ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Missing Firebase secrets. Set VITE_FIREBASE_* as repo secrets."
            exit 1
          fi
          cat > .env.local <<EOF
          VITE_FIREBASE_API_KEY=$API_KEY
          VITE_FIREBASE_AUTH_DOMAIN=$AUTH_DOMAIN
          VITE_FIREBASE_PROJECT_ID=$PROJECT_ID
          VITE_FIREBASE_STORAGE_BUCKET=$STORAGE
          VITE_FIREBASE_MESSAGING_SENDER_ID=$SENDER_ID
          VITE_FIREBASE_APP_ID=$APP_ID
          EOF

      - name: Build client-firebase bundle
        working-directory: client-firebase
        run: npm run build

      - name: Install mobile-firebase deps
        working-directory: mobile-firebase
        run: npm ci

      - name: Generate Android app icon + splash
        working-directory: mobile-firebase
        continue-on-error: true
        run: |
          if [ -f "resources/icon.png" ] && [ -f "resources/splash.png" ]; then
            npx capacitor-assets generate --android
          else
            echo "::warning::resources/icon.png or resources/splash.png missing — APK will ship with the default Capacitor icon. Drop them in mobile-firebase/resources/ and re-run."
          fi

      - name: Sync web assets into Android project
        working-directory: mobile-firebase
        run: npx cap sync android

      - name: Grant execute on gradlew
        working-directory: mobile-firebase/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: mobile-firebase/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: crm-firebase-debug-apk
          path: mobile-firebase/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
