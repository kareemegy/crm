name: Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'client-firebase/**'
      - '.github/workflows/firebase-hosting.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-firebase/package-lock.json

      - name: Install deps
        working-directory: client-firebase
        run: npm ci

      - name: Write Firebase config to .env.local
        working-directory: client-firebase
        env:
          API_KEY:     ${{ secrets.VITE_FIREBASE_API_KEY }}
          AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          PROJECT_ID:  ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          STORAGE:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          SENDER_ID:   ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          APP_ID:      ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          cat > .env.local <<EOF
          VITE_FIREBASE_API_KEY=$API_KEY
          VITE_FIREBASE_AUTH_DOMAIN=$AUTH_DOMAIN
          VITE_FIREBASE_PROJECT_ID=$PROJECT_ID
          VITE_FIREBASE_STORAGE_BUCKET=$STORAGE
          VITE_FIREBASE_MESSAGING_SENDER_ID=$SENDER_ID
          VITE_FIREBASE_APP_ID=$APP_ID
          EOF

      - name: Build
        working-directory: client-firebase
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: tik-crm
          channelId: live
          entryPoint: client-firebase
